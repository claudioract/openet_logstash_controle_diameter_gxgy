filter {
    # teste git
    # Melhoria para tratar no rar rule install e remove




    # Adiciona informações do worker e timestamp de processamento
    mutate {
        #add_field => {
        #    "logstash_worker_id" => "%{[host][name]}-%{[@metadata][pipeline_id]}-worker-%{[@metadata][pipeline_worker_id]}"
        #    "processing_start_time" => "%{+YYYY-MM-dd'T'HH:mm:ss.SSSZ}"
        #}
    }
    if [message] =~ /time='[^']+'/ {
    # Extração dos campos básicos
    dissect {
      mapping => {
        "message" => "frame='%{frame}' time='%{time_raw}' src='%{src_ip}' srcport='%{src_port}' dst='%{dst_ip}' dstport='%{dst_port}' proto='%{protocol}' msgnr='%{message_number}' is_request='%{is_request}' cmd='%{command_code}' req_frame='%{request_frame}' ans_frame='%{answer_frame}' resp_time='%{response_time_str}' %{diameter_fields}"
      }
    }

    # Processamento dos campos Diameter
    kv {
      source => "diameter_fields"
      field_split => " "
      value_split => "="
      prefix => "diameter_"
      transform_key => "lowercase"
      remove_field => ["diameter_fields"]
    }

    # Remoção de aspas dos campos básicos
    mutate {
      gsub => [
        "time_raw", "'", "",
        "frame", "'", "",
        "message_number", "'", "",
        "request_frame", "'", "",
        "answer_frame", "'", "",
        "protocol", "'", "",
        "src_ip", "'", "",
        "dst_ip", "'", "",
        "src_port", "'", "",
        "dst_port", "'", "",
        "is_request", "'", "",
        "response_time_str", "'", "",
        "command_code", "'", "",
        "request_flag", "'", "",
        "hop_by_hop_id", "'", "",
        "diameter_session-id", "'", "",
        "diameter_auth-application-id", "'", "",
        "diameter_cc-request-number", "'", "",
        "diameter_subscription-id-data", "'", "",
        "diameter_origin-host", "'", "",
        "diameter_destination-realm", "'", "",
        "diameter_rat-type", "'", "",
        "diameter_apn-aggregate-max-bitrate-ul", "'", "",
        "diameter_apn-aggregate-max-bitrate-dl", "'", "",
        "diameter_3gpp-sgsn-mcc-mnc", "'", "",
        "diameter_result-code", "'", "",
        "diameter_rating-group", "'", "",
        "diameter_cc-total-octets", "'", "",
        "diameter_3gpp.rat-type", "'", "",
        "diameter_charging-rule-base-name", "'", "",
        "diameter_3gpp-reporting-reason", "'", "",
        "diameter_user-equipment-info-value", "'", "",
        "diameter_3gpp-charging-characteristics", "'", "",
        "diameter_termination-cause", "'", "",
        "diameter_route-record", "'", "",
        "diameter_flags.request", "'", "",
        "diameter_event-trigger", "'", "",
        "diameter_charging-rule-name", "'", "",
	"diameter.3gpp.rat-type", "'", "",
        "diameter_qos-class-identifier", "'", "",
        "diameter_hopbyhopid", "'", ""
      ]
    }


#ruby {
#  code => '
#    event.to_hash.each do |k, v|
#      if k.start_with?("diameter_") && v.is_a?(String)
#        event.set(k, v.gsub("'", ""))
#      end
#    end
#  '
#}

    # Renomeação dos campos Diameter (removendo prefixo)
     mutate {
      rename => {
        "diameter_session-id" => "session_id"
        "diameter_cc-request-type" => "cc_request_type"
        "diameter_auth-application-id" => "auth_application_id"
        "diameter_cc-request-number" => "cc_request_number"
        "diameter_subscription-id-data" => "subscription_id_data"
        "diameter_origin-host" => "origin_host"
        "diameter_destination-realm" => "destination_realm"
        "diameter_rat-type" => "rat_type"
        "diameter_apn-aggregate-max-bitrate-ul" => "apn_aggregate_max_bitrate_ul"
        "diameter_apn-aggregate-max-bitrate-dl" => "apn_aggregate_max_bitrate_dl"
        "diameter_3gpp-sgsn-mcc-mnc" => "3gpp_sgsn_mcc_mnc"
        "diameter_result-code" => "result_code"
        "diameter_rating-group" => "rating_group"
        "diameter_cc-total-octets" => "cc_total_octets"
        "diameter_3gpp.rat-type" => "3gpp_rat_type"
        "diameter_charging-rule-base-name" => "charging_rule_base_name"
        "diameter_3gpp-reporting-reason" => "reporting_reason"
        "diameter_user-equipment-info-value" => "user_equipment_info_value"
        "diameter_3gpp-charging-characteristics" => "charging_characteristics"
        "diameter_termination-cause" => "termination_cause"
        "diameter_route-record" => "route_record"
        "diameter_flags.request" => "flags_request"
        "diameter_event-trigger" => "event_trigger"
        "diameter_charging-rule-name" => "charging_rule_name"
        "diameter_qos-class-identifier" => "qos_class_identifier"
        "diameter_hopbyhopid" => "hop_by_hop_id"
      }
    }


    ruby {
      code => "
        msg = event.get('message').to_s
        installs = []
        removes  = []
    
        # Captura todos os AVPs em ordem
        avps = msg.scan(/AVP Code='(\d+)'(?: Charging-Rule-Base-Name='([^']+)')?/)
    
        last_marker = nil
        avps.each do |code, name|
          if code == '1001' || code == '1002'
            last_marker = code
          elsif code == '1004' && name && last_marker
            if last_marker == '1001'
              installs << name
            elsif last_marker == '1002'
              removes << name
            end
            last_marker = nil
          end
        end
    
        event.set('charging_rule_install', installs.size == 1 ? installs.first : installs) if installs.any?
        event.set('charging_rule_remove', removes.size == 1 ? removes.first : removes) if removes.any?
      "
    }

    # Conversão de tipos de dados
    mutate {
      convert => {
        "time_raw" => "float"
        "frame" => "integer"
        "src_port" => "string"
        "dst_port" => "string"
        "message_number" => "integer"
        "is_request" => "string"
        "command_code" => "string"
        "request_frame" => "integer"
        "answer_frame" => "integer"
        "response_time_str" => "float"
        "session_id" => "string"
        "cc_request_type" => "string"
        "auth_application_id" => "string"
        "cc_request_number" => "integer"
        "subscription_id_data" => "string"
        "origin_host" => "string"
        "destination_realm" => "string"
        "rat_type" => "string"
        "apn_aggregate_max_bitrate_ul" => "string"
        "apn_aggregate_max_bitrate_dl" => "string"
        "3gpp_sgsn_mcc_mnc" => "string"
        "result_code" => "string"
        "rating_group" => "string"
        "cc_total_octets" => "string"
        "3gpp_rat_type" => "string"
        "charging_rule_base_name" => "string"
        "reporting_reason" => "string"
        "user_equipment_info_value" => "string"
        "charging_characteristics" => "string"
        "termination_cause" => "string"
        "route_record" => "string"
        "flags_request" => "string"
        "message" => "string"
        "event_trigger" => "string"
        "charging_rule_name" => "string"
        "qos_class_identifier" => "string"
        "hop_by_hop_id" => "string"
        "charging_rule_name_decoded_str" => "string"
        "user_equipment_info_decoded" => "string"
        "charging_rule_install" => "string"
        "charging_rule_remove" => "string"
      }
    }

    ruby {
    code => '
      ip_map = {
        "10.110.144.15" => "perpccsigm1",
	"10.110.144.16" => "perpccsigm2",
	"10.123.135.143" => "encpccsigm1",
	"10.123.135.144" => "encpccsigm2"
      }

      src_ip = event.get("[src_ip]")
      dst_ip = event.get("[dst_ip]")

      if ip_map.key?(src_ip)
        event.set("hostname", ip_map[src_ip])
      elsif ip_map.key?(dst_ip)
        event.set("hostname", ip_map[dst_ip])
      end
    '
  }


  ruby {
    code => '
      session_id = event.get("session_id")
      
      if session_id.is_a?(Array)
        session_id = session_id.first
      end
      
      if session_id
        # Pega a parte antes do ";"
        pgw_part = session_id.split(";").first
        
        # Remove prefixos como d1-, d2-, ..., d10-
        pgw_part = pgw_part.gsub(/^d\d+-/, "")
        
        # Remove APENAS os sufixos -Gx, -Gy, -gy (no final da string)
        pgw_part = pgw_part.gsub(/-G[xy]$/i, "")
        
        event.set("pgw_name", pgw_part)
      end
    '
  }


    # Renomear campos após a conversão
    mutate {
      rename => {
        "time_raw" => "time_epoch"
        "response_time_str" => "response_time"
      }
    }

    # Conversão de timestamp
    date {
      match => ["time_epoch", "UNIX"]
      target => "@timestamp"
      timezone => "America/Sao_Paulo"
    }

    # Decodificação de campos hexadecimais
  if [charging_rule_name] {
    ruby {
      code => '
        rule_names = event.get("charging_rule_name")
        decoded_names = []

        if rule_names.is_a?(Array)
          rule_names.each do |hex_rule|
            begin
              clean_hex = hex_rule.to_s.gsub(/[\':]/, "")
              decoded = [clean_hex].pack("H*").force_encoding("UTF-8").strip
              decoded_names << decoded
            rescue => e
              decoded_names << "DECODE_ERROR:#{hex_rule}"
            end
          end
          event.set("charging_rule_name_decoded_str", decoded_names.join(","))
        else
          begin
            clean_hex = rule_names.to_s.gsub(/[\':]/, "")
            decoded = [clean_hex].pack("H*").force_encoding("UTF-8").strip
            event.set("charging_rule_name_decoded_str", decoded)
          rescue => e
            event.set("charging_rule_name_decoded_str", "DECODE_ERROR:#{rule_names}")
          end
        end
      '
    }
  }



    if [user_equipment_info_value] {
      ruby {
        code => '
          hex_string = event.get("user_equipment_info_value").to_s.gsub(":", "")
          begin
            decoded = [hex_string].pack("H*").force_encoding("UTF-8")
            event.set("user_equipment_info_decoded", decoded)
          rescue => e
            event.tag("_hex_decode_failure")
            event.set("user_equipment_info_decoded", "DECODE_ERROR: #{hex_string}")
          end
        '
      }
    }



    if [rating_group] {
      ruby {
        code => '
          rating_group_map = {
  	    "1"   => "1_Voip_WhatsApp_Download",
  	    "7"   => "7_Web",
  	    "8"   => "8_Redes_Sociais",
  	    "13"  => "13_Whatsapp",
  	    "400" => "400_Unica_Whatsapp_VoIP_P2P_Rd",
  	    "401" => "401_Youtube_Free_Rd",
  	    "402" => "402_Waze_Free_Rd",
  	    "403" => "403_Unica_Facebook_SP",
  	    "404" => "404_Instagram_Free_Rd",
  	    "405" => "405_Twitter_Free_Rd",
  	    "406" => "406_TikTok_Free_Rd",
  	    "407" => "407_Garena_Free_Rd",
  	    "408" => "408_App_Nubank_Free_Rd",
  	    "804" => "804_Disney",
  	    "816" => "816_Facebook",
  	    "831" => "831_Instagram",
  	    "832" => "832_Waze",
  	    "835" => "835_PokemonGO",
  	    "843" => "843_Instagram_RS",
  	    "845" => "845_ClaroVideo",
  	    "846" => "846_NOW",
  	    "862" => "862_Netflix",
  	    "865" => "865_GloboPlay",
  	    "879" => "879_HBOMax",
  	    "882" => "882_CadastroPre",
  	    "899" => "899_Twitch"
          }

          rating_groups = event.get("rating_group")
          mapped_groups = []

          if rating_groups.is_a?(Array)
            rating_groups.each do |rg|
              mapped_groups << rating_group_map.fetch(rg.to_s.strip, rg)
            end
          else
            rating_groups.to_s.split(",").each do |rg|
              mapped_groups << rating_group_map.fetch(rg.strip, rg)
            end
          end

          event.set("rating_group", mapped_groups.join(","))
        '
      }
    }


  if [result_code] {
    ruby {
      code => '
        rc = event.get("result_code")
        if rc.is_a?(Array)
          event.set("result_code", rc.join(","))
        end
      '
    }
  }

    # Processamento de campos multi-valor
    if [subscription_id_data] {
      mutate {
        split => { "subscription_id_data" => " " }
        join => { "subscription_id_data" => "," }
      }
    }

    if [route_record] {
      mutate {
        split => { "route_record" => " " }
        join => { "route_record" => "," }
      }
    }


    if [event_trigger] {
      mutate {
        gsub => [
          "event_trigger", "^1$", "SGSN_CHANGE",
          "event_trigger", "^2$", "QOS_CHANGE",
          "event_trigger", "^3$", "RAT_CHANGE",
          "event_trigger", "^4$", "TFT_CHANGE",
          "event_trigger", "^5$", "PLMN_CHANGE",
          "event_trigger", "^6$", "LOSS_OF_BEARER",
          "event_trigger", "^7$", "RECOVERY_OF_BEARER",
          "event_trigger", "^8$", "IP-CAN_CHANGE",
          "event_trigger", "^9$", "QOS_CHANGE_EXCEEDING_AUTHORIZATION",
          "event_trigger", "^10$", "RAI_CHANGE",
          "event_trigger", "^11$", "USER_LOCATION_CHANGE",
          "event_trigger", "^12$", "NO_EVENT_TRIGGERS",
          "event_trigger", "^13$", "OUT_OF_CREDIT",
          "event_trigger", "^14$", "REALLOCATION_OF_CREDIT",
          "event_trigger", "^15$", "REVALIDATION_TIMEOUT",
          "event_trigger", "^16$", "UE_IP_ADDRESS_CHANGE",
          "event_trigger", "^17$", "ACCESS_NETWORK_INFO_REPORT"
        ]
      }
    }

    if [auth_application_id] {
      mutate {
        gsub => [
          "auth_application_id", "^4$", "Gy_4",
          "auth_application_id", "^16777236$", "Rx_16777236",
          "auth_application_id", "^16777238$", "Gx_16777238"
        ]
      }
    }


  if [rule_failure_code] {
    ruby {
      code => '
        rule_failure_map = {
          "0"  => "UNKNOWN_RULE_FAILURE",
          "1"  => "UNKNOWN_QOS_RULE_FAILURE",
          "2"  => "RATING_FAILURE",
          "3"  => "SERVICE_NOT_SUPPORTED",
          "4"  => "REQUESTED_SERVICE_NOT_AUTHORIZED",
          "5"  => "DUPLICATED_REQUEST",
          "6"  => "INITIAL_PARAMETERS_MISSING",
          "7"  => "INVALID_QOS_PARAMETERS",
          "8"  => "FILTER_RESTRICTIONS",
          "9"  => "MISSING_RESOURCES",
          "10" => "INVALID_TFT_OPERATION",
          "11" => "INVALID_PACKET_FILTERS",
          "12" => "MISSING_TFT_PARAMETERS",
          "13" => "INVALID_PCC_RULE_STATUS",
          "14" => "BEARER_HANDLING_NOT_SUPPORTED",
          "15" => "INVALID_TRAFFIC_MAPPING"
        }

        event.set("rule_failure_code",
          event.get("rule_failure_code").to_s.split(",").map { |code|
            rule_failure_map.fetch(code.strip, code.strip)
          }.join(", ")
        )
      '
    }
  }


   if [reporting_reason] {
     ruby {
       code => '
         reasons_map = {
           "0" => "THRESHOLD",
           "1" => "QHT",
           "2" => "FINAL",
           "3" => "QUOTA_EXHAUSTED",
           "4" => "VALIDITY_TIME",
           "5" => "OTHER_QUOTA_TYPE",
           "6" => "RATING_CONDITION_CHANGE",
           "7" => "FORCED_REAUTHORIZATION",
           "8" => "POOL_EXHAUSTED"
         }
         
         reporting_reasons = event.get("reporting_reason")
         mapped_reasons = []
         
         if reporting_reasons.is_a?(Array)
           reporting_reasons.each do |reason|
             mapped_reasons << reasons_map.fetch(reason.to_s.strip, reason)
           end
         else
           reporting_reasons.to_s.split(",").each do |reason|
             mapped_reasons << reasons_map.fetch(reason.strip, reason)
           end
         end
         
         event.set("reporting_reason", mapped_reasons.join(", "))
       '
     }
   }

    if [termination_cause] {
      mutate {
        gsub => [
        "termination_cause", "1", "DIAMETER_LOGOUT",
        "termination_cause", "2", "DIAMETER_SERVICE_NOT_PROVIDED_2",
        "termination_cause", "3", "DIAMETER_BAD_ANSWER_3",
        "termination_cause", "4", "DIAMETER_ADMINISTRATIVE",
        "termination_cause", "5", "DIAMETER_LINK_BROKEN_5",
        "termination_cause", "6", "DIAMETER_AUTH_EXPIRED_6",
        "termination_cause", "7", "DIAMETER_USER_MOVED_7",
        "termination_cause", "8", "DIAMETER_SESSION_TIMEOUT"
        ]
      }
    }

    if [rat_type] {
      mutate {
        gsub => [
          "rat_type", "^1004$", "4G",
          "rat_type", "^1000$", "3G",
          "rat_type", "^1001$", "2G"
        ]
      }
    }



  if [command_code] {
    mutate {
      gsub => [
        "command_code", "257", "257-Capabilities-Exchange",
        "command_code", "258", "258-rar",
        "command_code", "272", "272-credit-control",
        "command_code", "280", "280-Device-Watchdog"
      ]
    }
  }

  if "0" not in [is_request] and "1" in [is_request] and [command_code] == "258-rar" and ![cc_request_type] {
    mutate {
      replace => [ "cc_request_type", "RAR" ]
    }
  } else if "1" not in [is_request] and "0" in [is_request] and [command_code] == "258-rar" and ![cc_request_type] {
    mutate {
      replace => [ "cc_request_type", "RAA" ]
    }
  }

  if [is_request] == "1" and [command_code] == "257-Capabilities-Exchange" {
    mutate {
      replace => [ "cc_request_type", "CER" ]
    }
  } else if [is_request] == "0" and [command_code] == "257-Capabilities-Exchange" {
    mutate {
      replace => [ "cc_request_type", "CEA" ]
    }
  }


  if "0" not in [is_request] and "1" in [is_request] and [cc_request_type] {
    mutate {
      gsub => [
        "cc_request_type", "1", "CCRI",
        "cc_request_type", "2", "CCRU",
        "cc_request_type", "3", "CCRT"
      ]
    }
  } else if "1" not in [is_request] and "0" in [is_request] and [cc_request_type] {
    mutate {
      gsub => [
        "cc_request_type", "1", "CCAI",
        "cc_request_type", "2", "CCAU",
        "cc_request_type", "3", "CCAT"
      ]
    }
  } else if ("^1,0$" in [is_request] or "^0,1$" in [is_request]) and [cc_request_type] and "258-rar" in [command_code] {
    mutate {
      gsub => [
        "cc_request_type", "1$", "CCRI",
        "cc_request_type", "2", "CCRU",
        "cc_request_type", "3", "CCRT"
      ]
    }
  }


  if [diameter_type] and [cc_request_type] =~ /CCR/ and [auth_application_id] =~ /Gy_4/ {
    mutate {
      gsub => [
        "diameter_type", "^6$", "4G",    # 6 = E-UTRAN (4G/LTE)
        "diameter_type", "^1$", "2G",    # 1 = GERAN (2G)
        "diameter_type", "^2$", "3G",    # 2 = UTRAN (3G)
        "diameter_type", "^3$", "WLAN",  # 3 = WLAN
        "diameter_type", "^4$", "GAN",   # 4 = GAN
        "diameter_type", "^5$", "HSPA",  # 5 = HSPA Evolution
        "diameter_type", "^7$", "5G",    # 7 = 5G NR
        "diameter_type", "^1004$", "4G", # Algumas implementações usam 1004 para 4G
        "diameter_type", "^1000$", "3G", # 1000 para 3G
        "diameter_type", "^1001$", "2G"  # 1001 para 2G
      ]
    }
    mutate {
      rename => { "[diameter_type]" => "rat_type" }
    }
  }



  ruby {
    code => '
      cc_request_type = event.get("cc_request_type")
      auth_app_id = event.get("auth_application_id")
      rating_groups = event.get("rating_group")
      total_octets = event.get("cc_total_octets")
  
      if ["CCRU", "CCRT"].include?(cc_request_type) && auth_app_id == "Gy_4"
        # Tratamento do consumo total
        if total_octets
          total = 0
          
          case total_octets
          when Array
            total = total_octets.map(&:to_i).sum
          when String
            total = total_octets.split(",").map(&:to_i).sum
          when Numeric
            total = total_octets.to_i
          end
          
          event.set("consumo_total", total)
        end
  
        # Tratamento dos consumos por rating group
        if rating_groups && total_octets
          # Normaliza rating_groups para array
          rg_array = case rating_groups
                     when Array then rating_groups
                     when String then rating_groups.split(",")
                     else [rating_groups.to_s]
                     end
  
          # Normaliza total_octets para array
          octets_array = case total_octets
                         when Array then total_octets
                         when String then total_octets.split(",")
                         else [total_octets.to_s]
                         end
  
          # Cria hash de consumos
          consumos = {}
          rg_array.each_with_index do |rg, idx|
            next unless octets_array[idx]
            octets = octets_array[idx].to_i
            consumos[rg] = octets
          end
  
          event.set("consumos", consumos) unless consumos.empty?
        end
      end
    '
  }


  # Inicialização Redis e cache local — roda uma vez por worker
  #
  ruby {
    id => "init_redis"
    init => '
      require "redis"
      # Cache local em memória
      $local_cache ||= {}
      $CACHE_TTL ||= 30 # segundos

      # Conexão Redis única e persistente
      $rc ||= Redis.new(
        host: "127.0.0.1",
        port: 6379,
        timeout: 0.5,
        reconnect_attempts: 3
      )
    '
    code => '
      # Nenhuma ação no evento aqui — é só para garantir init
    '
  }

  #
  # Bloco único para manipulação Redis
  #
  ruby {
    id => "redis_handler"
    code => '
      begin
        ccrt = event.get("cc_request_type")
        sess_id = event.get("session_id")
        sub_data_raw = event.get("subscription_id_data")
        session_key = "msisdn:#{sess_id}"
        now = Time.now.to_f

        case ccrt
        when "CCRI", "CCRU", "CCRT"
          if sub_data_raw
            msisdn = sub_data_raw.to_s.split(",").find { |v| v.strip.start_with?("55") }
            if msisdn
              msisdn = msisdn.strip
              event.set("msisdn", msisdn)
              $rc.set(session_key, msisdn, ex: 172800)
              #if $rc.setnx(session_key, msisdn)
              #  $rc.expire(session_key, 172800) # TTL 48h
              #end
              $local_cache[session_key] = { value: msisdn, time: now }
            end
          end

        when /^CCA[UIT]$/, "RAR", "RAA"
          # Consulta cache local primeiro
          if $local_cache.key?(session_key) && (now - $local_cache[session_key][:time]) < $CACHE_TTL
            msisdn = $local_cache[session_key][:value]
          else
            msisdn = $rc.get(session_key)
            $local_cache[session_key] = { value: msisdn, time: now }
          end
           unless msisdn
             sleep(0.05) # 50ms
             msisdn = $rc.get(session_key)
           end
          event.set("msisdn", msisdn) if msisdn

        when "CCAT"
          $rc.del(session_key)
          $local_cache.delete(session_key)
        end

      rescue => e
        event.tag("_redis_error")
      end
    '
  }

    # Adiciona timestamp de conclusão do processamento
    #mutate {
    #    add_field => {
    #        "processing_end_time" => "%{+YYYY-MM-dd'T'HH:mm:ss.SSSZ}"
    #    }
    #}

   # Limpeza final
    mutate {
      remove_field => [
        "time_epoch",
        "charging_rule_name",
	"event",
        "original",
        "@version",
        "request_flag",
	"message",
        "flags_request"
      ]
    }
  } else {
    drop {}
  }
}
